services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: questionnaire_db
      POSTGRES_USER: questionnaire_user
      POSTGRES_PASSWORD: questionnaire_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
